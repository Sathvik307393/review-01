# KitchenOS Nginx Domain-Based Routing Configuration
# Maps custom subdomains under sathvikdevops.online directly to Node.js microservices

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    
    sendfile on;
    keepalive_timeout 65;

    # CORS Origin Mapping
    map $http_origin $cors_origin {
        default "";
        "~^https?://([^/]+\.)?sathvikdevops\.online$" "$http_origin";
    }

    # Common Proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Frontend Web UI (kitchenos.sathvikdevops.online)
    server {
        listen 80;
        server_name kitchenos.sathvikdevops.online sathvikdevops.online www.sathvikdevops.online;

        location / {
            proxy_pass http://127.0.0.1:3000;
        }

        location /api/recipes {
            proxy_pass http://127.0.0.1:3001;
        }

        location /api/pantry {
            proxy_pass http://127.0.0.1:3002;
        }

        location /api/planner {
            proxy_pass http://127.0.0.1:3003;
        }

        location /api/shopping {
            proxy_pass http://127.0.0.1:3004;
        }

        location /api/nutrition {
            proxy_pass http://127.0.0.1:3005;
        }

        location /api/metrics {
            proxy_pass http://127.0.0.1:3006;
        }
    }

    # 2. Recipes Service (recipes.sathvikdevops.online)
    server {
        listen 80;
        server_name recipes.sathvikdevops.online;

        location / {
            # CORS headers
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                return 204;
            }

            proxy_pass http://127.0.0.1:3001;
        }
    }

    # 3. Pantry Service (pantry.sathvikdevops.online)
    server {
        listen 80;
        server_name pantry.sathvikdevops.online;

        location / {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                return 204;
            }

            proxy_pass http://127.0.0.1:3002;
        }
    }

    # 4. Meal Planner Service (planner.sathvikdevops.online)
    server {
        listen 80;
        server_name planner.sathvikdevops.online;

        location / {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                return 204;
            }

            proxy_pass http://127.0.0.1:3003;
        }
    }

    # 5. Shopping List Service (shopping.sathvikdevops.online)
    server {
        listen 80;
        server_name shopping.sathvikdevops.online;

        location / {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                return 204;
            }

            proxy_pass http://127.0.0.1:3004;
        }
    }

    # 6. Nutrition Tracker Service (nutrition.sathvikdevops.online)
    server {
        listen 80;
        server_name nutrition.sathvikdevops.online;

        location / {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                return 204;
            }

            proxy_pass http://127.0.0.1:3005;
        }
    }

    # 7. Metrics Service (metrics.sathvikdevops.online)
    server {
        listen 80;
        server_name metrics.sathvikdevops.online;

        location / {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                return 204;
            }

            proxy_pass http://127.0.0.1:3006;
        }
    }
}
