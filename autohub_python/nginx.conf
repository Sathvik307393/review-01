# AutoHub Nginx Domain-Based Routing Configuration
# Maps custom subdomains directly to individual microservices under sathvikdevops.site

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    
    sendfile on;
    keepalive_timeout 65;

    # CORS configuration helpers
    map $request_method $cors_method {
        default "0";
        "OPTIONS" "1";
    }

    map $http_origin $cors_origin {
        default "";
        "~^https?://([^/]+\.)?sathvikdevops\.site$" "$http_origin";
    }

    # Common Proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Frontend Web UI Subdomain
    server {
        listen 80;
        server_name autohub.sathvikdevops.site sathvikdevops.site www.sathvikdevops.site;

        location / {
            proxy_pass http://127.0.0.1:5000;
        }

        location /api/auth {
            proxy_pass http://127.0.0.1:5001;
        }

        location /api/inventory {
            proxy_pass http://127.0.0.1:5002;
        }

        location /api/booking {
            proxy_pass http://127.0.0.1:5003;
        }

        location /api/service {
            proxy_pass http://127.0.0.1:5004;
        }

        location /api/payment {
            proxy_pass http://127.0.0.1:5005;
        }

        location /api/valuation {
            proxy_pass http://127.0.0.1:5006;
        }

        location /api/fuel {
            proxy_pass http://127.0.0.1:5007;
        }

        location /api/insurance {
            proxy_pass http://127.0.0.1:5008;
        }

        location /api/metrics {
            proxy_pass http://127.0.0.1:5009;
        }
    }

    # 2. Auth Microservice Subdomain
    server {
        listen 80;
        server_name auth.sathvikdevops.site;

        location / {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            proxy_pass http://127.0.0.1:5001;
        }
    }

    # 3. Inventory Microservice Subdomain
    server {
